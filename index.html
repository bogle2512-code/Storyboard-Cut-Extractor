<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101511" />
    <title>Storyboard Cut Extractor</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icon-192.png" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">Storyboard Cut Extractor</p>
            <h1>스토리보드 컷 추출</h1>
          </div>
          <div class="topActions">
            <input id="topFileInput" type="file" accept="image/jpeg,image/png,image/webp" />
            <button type="button" class="primary" id="pickButton">이미지 선택</button>
            <button type="button" id="manualButton" disabled>수동 선택</button>
            <button type="button" id="cancelButton" disabled>선택 취소</button>
            <button type="button" id="resetButton" disabled>초기화</button>
            <button type="button" id="zipButton" disabled>ZIP 저장</button>
          </div>
        </header>

        <div class="content">
          <section class="imagePanel" aria-label="원본 이미지 미리보기">
            <div class="previewStage" id="previewStage">
              <label class="dropTarget">
                <input id="dropFileInput" type="file" accept="image/jpeg,image/png,image/webp" />
                <strong>스토리보드 이미지 업로드</strong>
                <span>JPG, PNG, WEBP</span>
              </label>
            </div>
          </section>

          <aside class="sidePanel">
            <div class="statusBar">
              <strong id="cutCount">0 컷</strong>
              <span id="statusText">이미지를 업로드하면 컷 선택을 시작할 수 있습니다.</span>
            </div>
            <div class="exportSettings">
              <div class="modeTabs full" aria-label="내보내기 모드">
                <strong>기본 모드</strong>
              </div>
              <div class="settingBlock full">
                <label>
                  <span>프로젝트명</span>
                  <input id="projectNameInput" type="text" value="storyboard-project" />
                </label>
              </div>
              <div class="settingBlock full">
                <span>출력 사이즈</span>
                <div class="checkboxGrid">
                  <label><input type="checkbox" name="exportSize" value="original" checked /> 원본 저장</label>
                  <label><input type="checkbox" name="exportSize" value="1920x1080" checked /> 1920x1080</label>
                  <label><input type="checkbox" name="exportSize" value="3840x2160" /> 3840x2160</label>
                  <label><input type="checkbox" name="exportSize" value="1080x1920" /> 1080x1920</label>
                  <label><input type="checkbox" name="exportSize" value="1080x1080" /> 1080x1080</label>
                  <label><input type="checkbox" name="exportSize" value="1080x1350" /> 1080x1350</label>
                </div>
              </div>
              <div class="settingBlock full">
                <span>저장 방식</span>
                <div class="resizeChoices">
                  <label class="choiceCard recommended">
                    <input type="radio" name="resizeMode" value="cover" checked />
                    <strong>사이즈에 꽉 차게 출력</strong>
                    <small>선택한 이미지를 각 출력 사이즈에 맞게 꽉 채워 저장합니다. 비율이 다른 경우 일부 영역은 자동으로 잘릴 수 있습니다.</small>
                  </label>
                </div>
              </div>
              <label>
                <span>업스케일</span>
                <select id="upscaleSelect">
                  <option value="none" selected>없음</option>
                  <option value="2x">2x</option>
                  <option value="4x">4x</option>
                </select>
              </label>
              <label class="checkLine">
                <input id="upscaleAfterSaveInput" type="checkbox" />
                <span>업스케일 후 저장</span>
              </label>
              <label>
                <span>저장 형식</span>
                <select id="formatSelect">
                  <option value="png">PNG</option>
                  <option value="jpeg">JPG</option>
                  <option value="webp">WEBP</option>
                </select>
              </label>
              <label>
                <span>품질</span>
                <input id="qualityInput" type="number" min="80" max="100" value="95" />
              </label>
              <label class="checkLine">
                <input id="metadataVisibleInput" type="checkbox" checked />
                <span>metadata 포함</span>
              </label>
              <div class="exportButtons full">
                <button type="button" id="previewExportsButton">선택 사이즈로 미리보기 생성</button>
                <button type="button" id="downloadZipButton">전체 ZIP 다운로드</button>
              </div>
            </div>
            <div class="exportPreviewPanel" id="exportPreviewPanel" hidden>
              <strong>최종 저장 이미지는 이렇게 보입니다.</strong>
              <div class="exportPreviewGrid" id="exportPreviewGrid"></div>
            </div>
            <div class="cutsGrid" id="cutsGrid">
              <div class="emptyState">선택한 컷이 여기에 표시됩니다.</div>
            </div>
          </aside>
        </div>
      </section>
    </main>
    <script src="./app.js"></script>
  </body>
</html>
